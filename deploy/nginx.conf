# deploy/nginx.conf
# Nginx reverse-proxy for ai-quant-lab (FastAPI on port 8000)
#
# Placed at /etc/nginx/conf.d/ai_quant_lab.conf by setup_ec2.sh.
# Adjust server_name to your domain or Elastic IP.

upstream ai_quant_lab {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;          # catch-all; replace with your domain if you have one

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/ai_quant_lab_access.log combined;
    error_log  /var/log/nginx/ai_quant_lab_error.log  warn;

    # ── Proxy to FastAPI ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://ai_quant_lab;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep-alive so Uvicorn reuses connections
        proxy_set_header   Connection        "";

        # Timeouts — increase if you expect slow /candles queries
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Health check (bypass auth if you add it later) ───────────────────────
    location /ping {
        proxy_pass         http://ai_quant_lab/ping;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }
}
