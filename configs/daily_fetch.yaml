pipeline_name: "daily_nifty50_fetch"
description: "Fetch daily OHLCV data for Nifty 50 stocks"

data_source:
  api: "kite_connect"
  exchange: "NSE"
  instruments:
    - "RELIANCE"
    - "HDFCBANK"
    - "TCS"
    - "INFY"
    - "ICICIBANK"
    - "HINDUNILVR"
    - "KOTAKBANK"
    - "LT"
    - "AXISBANK"
    - "SBIN"
    # Add more symbols here — no Python changes needed

date_range:
  start: "2025-10-01"
  end: "2026-04-09"
  interval: "day"

database:
  table: "stock_data"

retry:
  max_attempts: 3
  backoff_seconds: 2
